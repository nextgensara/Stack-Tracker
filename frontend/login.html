<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockTracker - Login</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-container {
      max-width: 420px;
      margin: 100px auto;
      padding: 0 24px;
    }
    .auth-card {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 40px 36px;
    }
    .auth-logo {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      color: #00d4aa;
      margin-bottom: 8px;
    }
    .auth-sub {
      text-align: center;
      color: #7a8899;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }
    .auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      background: #0a0f1e;
      border-radius: 8px;
      padding: 4px;
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      color: #7a8899;
      transition: all 0.2s;
    }
    .auth-tab.active {
      background: #00d4aa;
      color: #0a0f1e;
      font-weight: 700;
    }
    .auth-form { display: none; }
    .auth-form.active { display: block; }
    .error-msg {
      color: #ff6b35;
      font-size: 0.85rem;
      margin-top: 12px;
      text-align: center;
    }
    .success-msg {
      color: #00d4aa;
      font-size: 0.85rem;
      margin-top: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">📦 StockTracker</div>
      <div class="auth-sub">Intelligent Inventory Management</div>

      <!-- TABS -->
      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchTab('login')">Login</div>
        <div class="auth-tab" onclick="switchTab('register')">Register</div>
      </div>

      <!-- LOGIN FORM -->
      <div id="login-form" class="auth-form active">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="example@gmail.com">
        </div>
        <div class="form-group" style="margin-top:16px;">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••">
        </div>
        <button class="btn-add" style="width:100%;margin-top:24px;" onclick="loginUser()">
          🔐 Login
        </button>
        <div id="login-msg"></div>
      </div>

      <!-- REGISTER FORM -->
      <div id="register-form" class="auth-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="John Doe">
        </div>
        <div class="form-group" style="margin-top:16px;">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="example@gmail.com">
        </div>
        <div class="form-group" style="margin-top:16px;">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="••••••••">
        </div>
        <button class="btn-add" style="width:100%;margin-top:24px;" onclick="registerUser()">
          ✅ Register
        </button>
        <div id="register-msg"></div>
      </div>

    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      document.getElementById(tab + '-form').classList.add('active');
      event.target.classList.add('active');
    }

    async function loginUser() {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      if (!email || !password) {
        document.getElementById('login-msg').innerHTML = '<p class="error-msg">⚠️ எல்லாம் fill பண்ணுங்க!</p>';
        return;
      }
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (data.message.includes('✅')) {
    localStorage.setItem('user', JSON.stringify(data));
    window.location.href = 'http://127.0.0.1:5000/';
      } else {
        document.getElementById('login-msg').innerHTML = `<p class="error-msg">${data.message}</p>`;
      }
    }

    async function registerUser() {
      const name = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      if (!name || !email || !password) {
        document.getElementById('register-msg').innerHTML = '<p class="error-msg">⚠️ எல்லாம் fill பண்ணுங்க!</p>';
        return;
      }
      const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });
      const data = await res.json();
      if (data.message.includes('✅')) {
        document.getElementById('register-msg').innerHTML = `<p class="success-msg">${data.message}</p>`;
        setTimeout(() => switchTab('login'), 1500);
      } else {
        document.getElementById('register-msg').innerHTML = `<p class="error-msg">${data.message}</p>`;
      }
    }
  </script>
</body>
</html>
